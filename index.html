<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>8/3 vui vẻ nha</title>

<style>
html,body{
    margin:0;
    padding:0;
    overflow:hidden;
    height:100vh;
    width:100vw;
    background:radial-gradient(ellipse at bottom,#0d0d1a 0%,#000000 100%);
    font-family:sans-serif;
    transition:opacity 1.2s ease-out;
}

canvas{
    position:fixed;
    top:0;
    left:0;
}

#fullscreen-hint{
    position:fixed;
    bottom:20px;
    left:0;
    right:0;
    text-align:center;
    color:#aaa;
    font-size:14px;
    opacity:.7;
    z-index:100;
}
</style>
</head>

<body>

<canvas id="bg"></canvas>
<canvas id="text"></canvas>
<div id="fullscreen-hint">Chạm màn hình để xem toàn màn hình</div>

<script>

/* ================= FULLSCREEN (HỖ TRỢ ĐIỆN THOẠI) ================= */

const elem = document.documentElement

function goFullscreen(){
    if(!document.fullscreenElement){

        if(elem.requestFullscreen){
            elem.requestFullscreen().catch(()=>{})
        }
        else if(elem.webkitRequestFullscreen){
            elem.webkitRequestFullscreen()
        }
        else if(elem.msRequestFullscreen){
            elem.msRequestFullscreen()
        }

        document.getElementById("fullscreen-hint").style.display="none"
    }
}

/* điện thoại */
document.addEventListener("touchstart",goFullscreen,{once:true})

/* máy tính */
document.addEventListener("click",goFullscreen,{once:true})



/* ================= BACKGROUND MATRIX ================= */

const bg = document.getElementById("bg")
const bgCtx = bg.getContext("2d")

let w = bg.width = window.innerWidth
let h = bg.height = window.innerHeight

const letters = " HAPPY QUỐC TẾ PHỤ NỮ 8/3 ".split("")
const fontSize = 16

let columns = Math.floor(w/fontSize)
let drops = Array(columns).fill().map(()=>Math.random()*h)

function drawBG(){

    bgCtx.fillStyle="rgba(0,0,0,0.1)"
    bgCtx.fillRect(0,0,w,h)

    bgCtx.fillStyle="#FFCCCC"
    bgCtx.font=fontSize+"px monospace"

    for(let i=0;i<drops.length;i++){

        const text = letters[Math.floor(Math.random()*letters.length)]

        bgCtx.fillText(text,i*fontSize,drops[i]*fontSize)

        if(drops[i]*fontSize>h && Math.random()>0.975){
            drops[i]=0
        }

        drops[i]++
    }
}

setInterval(drawBG,33)



/* ================= TEXT PARTICLES ================= */

const canvas = document.getElementById("text")
const ctx = canvas.getContext("2d")

canvas.width=w
canvas.height=h

const sequence = [

{ text:"3", color:"#ffffff", delay:1400 },
{ text:"2", color:"#ffffff", delay:1400 },
{ text:"1", color:"#ffffff", delay:1400 },

{ text:"HAPPY", color:"#FFCCFF", delay:2200 },
{ text:"WOMAN'S", color:"#FFCCFF", delay:2200 },
{ text:"DAY", color:"#FFCCFF", delay:2400 }

]

let particles=[]
let currentIndex=0
let nextSwitchTime=Date.now()+sequence[0].delay
let currentColor="#ffffff"



function createParticlesFromText(word,color){

    const tempCanvas=document.createElement("canvas")
    const tempCtx=tempCanvas.getContext("2d")

    tempCanvas.width=w
    tempCanvas.height=h

    let fontSize

    if(["3","2","1"].includes(word)){
        fontSize=Math.min(180,w*0.27)
    }else{
        fontSize=Math.min(150,w*0.28)
    }

    tempCtx.font=`bold ${fontSize}px sans-serif`
    tempCtx.fillStyle="white"
    tempCtx.textAlign="center"
    tempCtx.textBaseline="middle"

    tempCtx.fillText(word,w/2,h/2)

    const data=tempCtx.getImageData(0,0,w,h).data

    const newParticles=[]

    for(let y=0;y<h;y+=6){
        for(let x=0;x<w;x+=6){

            const i=(y*w+x)*4

            if(data[i+3]>100){

                newParticles.push({

                    x:Math.random()*w,
                    y:Math.random()*h,
                    tx:x+2,
                    ty:y+2,
                    alpha:0

                })
            }
        }
    }

    particles=newParticles
    currentColor=color
}



function animate(){

requestAnimationFrame(animate)

ctx.clearRect(0,0,w,h)

const now=Date.now()

if(now>=nextSwitchTime && currentIndex<sequence.length){

    const item=sequence[currentIndex]

    createParticlesFromText(item.text,item.color)

    currentIndex++

    if(currentIndex<sequence.length){
        nextSwitchTime=now+sequence[currentIndex].delay
    }
}

particles.forEach(p=>{

    p.x+=(p.tx-p.x)*0.09
    p.y+=(p.ty-p.y)*0.09
    p.alpha+=(1-p.alpha)*0.07

    ctx.fillStyle=`rgba(${hexToRgb(currentColor)},${p.alpha})`

    ctx.beginPath()
    ctx.arc(p.x,p.y,2.4,0,Math.PI*2)
    ctx.fill()

})

}

animate()



function hexToRgb(hex){

const bigint=parseInt(hex.replace("#",""),16)

return [

(bigint>>16)&255,
(bigint>>8)&255,
bigint&255

].join(",")

}



/* ================= RESIZE ================= */

window.onresize=()=>{

w=bg.width=canvas.width=window.innerWidth
h=bg.height=canvas.height=window.innerHeight

columns=Math.floor(w/fontSize)
drops=Array(columns).fill().map(()=>Math.random()*h)

}



/* ================= SHOOTING STAR ================= */

function createShootingStar(){

const star=document.createElement("div")

star.style.position="fixed"
star.style.top=Math.random()*window.innerHeight*0.5+"px"
star.style.left=window.innerWidth+"px"

star.style.width="2px"
star.style.height="2px"

star.style.background="white"

star.style.boxShadow="0 0 6px white,0 0 20px white"

star.style.transform="rotate(-45deg)"

star.style.transition="transform 1s linear,opacity 1s"

document.body.appendChild(star)

setTimeout(()=>{

star.style.transform="translate(-1200px,1200px)"
star.style.opacity="0"

},50)

setTimeout(()=>{

star.remove()

},1000)

}

setInterval(()=>{

if(Math.random()>0.45){

createShootingStar()

}

},900)

</script>

</body>
</html>
